
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab HTML-03 - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <form class="auth-form" action="#" method="POST">
            <h2>Login</h2>
            
            <div class="form-group">
                <label for="user">Username:</label>
                <input type="text" id="user" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="pass">Password:</label>
                <input type="password" id="pass" name="password" required autocomplete="current-password">
            </div>

            <div class="button-wrapper">
                <button type="submit" class="submitbutton">Entrar</button>
            </div>
        </form>
    </main>

</body>
</html>
