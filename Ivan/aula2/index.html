<!DOCTYPE html>

<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="version" content="1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Inscrição para Evento</title>
</head>

<body>
    <header>
        <h1>Eventos da UBI</h1>
        <img src="logo.png" alt="logo UBI" width="350">
    </header>

    <nav>
        <ul aria-label = "Navegação principal">
            <li><a href="https://www.ubi.pt/" target="_blank">Início</a></li>
            <li><a href="https://www.ubi.pt/curso/42" target="_blank">Programação</a></li>
            <li><a href="https://www.ubi.pt/Pagina/Mapas_e_Direc__es" target="_blank">Localização</a></li>
        </ul>
    </nav>

    <h3>Por favor, preencha o formulario a baixo:</h3>
    <main>
        <form>
            <div>
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" minlength="3" maxlength="50" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div>
                <label for="telefone">Telefone</label>
                <input type="tel">
            </div>
            <div>

                <label for="url">Pagina pessoal</label>
                <input type="url">
            </div>
            <div>
                <label for="codPostal">Código postal</label>
                <input type="text" id="codPostal" name="codPostal" pattern="\d{4}-\d{3}">
            </div>

            <div>
                <label for="ingresso">Tipo de ingresso</label>
                <select id="ingresso" name="ingresso" required>
                    <option value="">Escolha uma opcao...</option>
                    <option value="estudante">Estudante</option>
                    <option value="professor">Professor</option>
                    <option value="visitante">Visitante</option>
                </select>
            </div>
            <br>
            <div>
                <input type="submit" value="Enviar Inscrição">
            </div>
        </form>
    </main>

    <footer>
        <p>Contactos: ubi@ubi.pt | Telefone : 275 234 983</p>
        <p>&copy; 2026 Eventos UBI. Todos os direitos reservados.</p>
    </footer>

</body>

</html>
